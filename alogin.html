<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم تسجيل الدخول بنجاح - عزيز نت</title>
    <script src="js/theme.js"></script>
    <meta http-equiv="refresh" content="3; url=$(link-orig)">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header App Bar -->
    <div class="app-header">
        <div class="header-right">
            <a href="https://wa.me/967739367154" class="app-icon-btn green-text" data-tooltip="تواصل معنا"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="prices.html" class="app-icon-btn yellow-text" data-tooltip="الباقات والأسعار"><i class="fa-solid fa-dollar-sign"></i></a>
        </div>
        <div class="header-left">
            <label class="toggle-switch-wrapper">
                الوضع الليلي
                <div class="toggle-switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </div>
            </label>
        </div>
    </div>

    <!-- Main Card -->
    <div class="card-container">

        <div class="success-circle">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <div class="text-danger" style="color: var(--bar-green); font-size: 22px;">
            الرجاء استخدام الشبكة بما يرضي الله عز وجل
        </div>

        <div class="text-danger" style="margin-bottom: 12px;">
            تم تسجيل الدخول بنجاح
        </div>

        <!-- Animated Countdown -->
        <div class="countdown-wrapper">
            <div class="countdown-circle" id="countdownCircle">
                <svg viewBox="0 0 78 78"><circle cx="39" cy="39" r="36" id="countdownRing"></circle></svg>
                <span id="countdownNum">3</span>
            </div>
            <div class="countdown-label">جاري التحويل خلال أثوانمعدودة…</div>
        </div>

        <div class="text-normal">
            سيتم تحويلك الآن الى الموقع المطلوب تلقائياً ، اذا لم يتم تحويلك
        </div>

        <a href="$(link-orig)" style="text-decoration: none;">
            <button class="btn-primary" style="margin-bottom: 20px;">
                أضغط هنا
            </button>
        </a>

        <div class="footer-text">
            تطوير <span class="green">عزيز الشرعبي</span> © 2026
            <span class="yellow">[ عزيز نت نسعى دوماً لإرضاء عملائنا للتواصل 739367154 ]</span>
        </div>

    </div>

    <script src="js/demo.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Animated countdown ring for alogin
        (function () {
            var numEl  = document.getElementById('countdownNum');
            var ringEl = document.getElementById('countdownRing');
            var total  = 3;
            var circumference = 226;

            function setRing(secs) {
                var offset = circumference - (secs / total) * circumference;
                if (ringEl) ringEl.style.strokeDashoffset = offset;
                if (numEl)  numEl.textContent = secs;
            }

            setRing(total);
            var t = total;
            var iv = setInterval(function () {
                t--;
                setRing(t);
                if (t <= 0) clearInterval(iv);
            }, 1000);
        })();
    </script>
</body>

</html>
